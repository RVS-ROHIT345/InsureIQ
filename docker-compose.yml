version: "3.9"

services:
  insureiq-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env  # Never commit .env — see .gitignore
    environment:
      - APP_ENV=production
    # Restart on crash — important for Cloud Run equivalent behavior
    restart: unless-stopped
    # Health check — Cloud Run uses this. The slim image has no curl, so probe
    # with the Python stdlib (mirrors the Dockerfile HEALTHCHECK).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP file server (separate process)
  insureiq-mcp:
    build: .
    command: ["python", "mcp_server/file_server.py"]
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped
